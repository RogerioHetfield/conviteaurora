<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convite Aurora 1 Aninho</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@400;600;700&display=swap');

        :root {
            --rosa-principal: #ff69b4;
            --rosa-escuro: #d81b60;
            --dourado: #c5a059;
            --creme: #fffaf0;
        }

        body {
            margin: 0;
            padding: 10px 0;
            background-color: #f75e9192;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Montserrat', sans-serif;
        }

        .card {
            width: 95%;
            max-width: 420px;
            background: var(--creme);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            border: 6px solid #fff;
            text-align: center;
            position: relative;
        }

        /* Vídeo Header */
        .video-header {
            width: 100%;
            line-height: 0;
            background: #000;
            position: relative;
        }

        video {
            width: 100%;
            display: block;
        }

        /* Posicionamento das Imagens Adicionais (Fadinhas/Decor) */
        .card {
            position: relative;
        }

        .bolinha {
            color: var(--rosa-escuro);
            width: 6px;
        }

        .decor-img {
            position: absolute;
            /* Elas flutuam sobre o conteúdo */
            z-index: 15;
            /* Garante que fiquem na frente de tudo */
            pointer-events: none;
            /* Evita que elas atrapalhem o clique nos botões */
            transition: transform 0.3s;
        }

        .fadinha-azul {
            top: 110px;
            left: 250px;
            width: 210px;
            animation: none;
            /* garante que nada interfira */

            /* espelhamento alternativo */
            -webkit-transform: scaleX(-1);
            transform: scaleX(-1);
        }

        .espelho {
            transform: scaleX(-1);
        }

        .fadinha-vermelha {
            top: 120px;
            right: -44px;
            width: 210px;
            transform: scaleX(1);
            /* normal */
        }

        .fadinha-verde {
            bottom: -40px;
            left: -59px;
            width: 210px;

        }

        /* Animação suave para parecer que estão voando */
        @keyframes flutuar {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        @media (max-width: 480px) {

            .fadinha-azul {
                top: 18%;
                left: 50%;
                width: 60%;
            }

            .fadinha-vermelha {
                top: 14%;
                right: -15%;
                width: 60%;
            }

            .fadinha-verde {
                bottom: -04%;
                left: -20%;
                width: 60%;
            }

        }

        .decor-img {
            animation: flutuar 3s ease-in-out infinite;
        }

        .content {
            padding: 35px 20px 20px 20px;
            background-image: url('assets/flowers.png');
            position: relative;
            background-color: #f75e912b;
        }

        .chamada {
            color: var(--rosa-escuro);
            font-size: 0.95rem;
            font-weight: 700;
            line-height: 1.3;
            margin-top: -120px;
            padding: 10px 0;
            border-top: 2px solid rgba(197, 160, 89, 0.2);
            border-bottom: 2px solid rgba(197, 160, 89, 0.2);
        }

        .nome-logo {
            width: 330px;
            /* Espaço para a imagem do nome "Aurora" estilizado */
            margin: 0 auto;
            display: block;
            margin-bottom: 20px;
            margin-top: -20px;
            filter: drop-shadow(2px 4px 6px rgba(0, 0, 0, 0.2));
        }

        .aninho-texto {
            font-family: 'Dancing Script', cursive;
            font-size: 1.5rem;
            color: var(--rosa-principal);
            margin-top: -10px;
            margin-bottom: 20px;
        }

        .data-destaque {
            color: var(--dourado);
            font-size: 1.4rem;
            font-weight: 700;
            margin: 15px 0;
            padding: 10px 0;
            border-top: 2px solid rgba(197, 160, 89, 0.2);
            border-bottom: 2px solid rgba(197, 160, 89, 0.2);
        }

        /* Grid de Botões */
        .botoes-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 25px 0;
        }

        .btn-circular {
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.2s;
        }

        .circulo {
            width: 75px;
            height: 75px;
            background: white;
            border: 4px solid var(--dourado);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            margin-bottom: 8px;
        }

        .circulo img {
            width: 45px;
            /* Tamanho dos ícones dentro do círculo */
        }

        .label {
            font-size: 0.75rem;
            color: var(--rosa-escuro);
            font-weight: 700;
            line-height: 1.1;
        }

        .countdown {
            background: #fce4ec;
            color: var(--rosa-escuro);
            padding: 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 15px;
            border: 1px dashed var(--rosa-principal);
        }

        .footer-text {
            color: var(--rosa-principal);
            font-size: 0.85rem;
            margin-top: 10px;
        }

        .confirmacao-destaque {
            font-weight: 700;
            color: var(--rosa-escuro);
            display: block;
            margin-top: 5px;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

    <div class="card">

        <div class="video-header">
            <video id="meuVideo" poster="capa-video.jpg" playsinline controls>
                <source src="assets/aurora (1).mp4" type="video/mp4">
            </video>
        </div>

        <div class="content">

            <div class="espelho">
                <img src="assets/fadinha-azul.png" class="decor-img fadinha-azul">
            </div>
            <img src="assets/fadinha-vermelha.png" class="decor-img fadinha-vermelha" alt="">
            <img src="assets/fadinha-verde.png" class="decor-img fadinha-verde" alt="">

            <img src="assets/aurora1.jpg.png" class="nome-logo" alt="Aurora">

            <div class="chamada">Todo o Reino Encantado está em festa para comemorar o primeiro aninho da Princesa
                Aurora!</div>

            <div class="data-destaque">
                Domingo <span class="bolinha">•</span> 07 de Junho <span class="bolinha">•</span> Às 12h
            </div>

            <div class="countdown" id="countdown">Calculando tempo...</div>

            <div class="botoes-container">
                <a href="https://maps.google.com/?q=Chacara+do+Pedro+Taxi" target="_blank" class="btn-circular">
                    <div class="circulo">
                        <img src="assets/placeholder.png" alt="Local">
                    </div>
                    <span class="label">LOCAL<br>DA FESTA</span>
                </a>

                <a href="https://wa.me/5519971172457?text=Oii Carla! É claro que confirmo presença. Não perco essa festa por nada."
                    target="_blank" class="btn-circular">
                    <div class="circulo">
                        <img src="assets/do-utilizador.png" alt="Confirmar">
                    </div>
                    <span class="label">CONFIRMAR<br>PRESENÇA</span>
                </a>

                <a href="presentes.html" target="_blank" class="btn-circular">
                    <div class="circulo">
                        <img src="assets/presente.png" alt="Presente">
                    </div>
                    <span class="label">SUGESTÃO<br>DE PRESENTE</span>
                </a>
            </div>

            <div class="footer-text">
                Toque nos ícones para interagir 👆
                <span class="confirmacao-destaque">Confirme sua presença até o dia 20/05</span>
            </div>
        </div>
    </div>

    <script>
        document.body.addEventListener('click', function () {
            const v = document.getElementById('meuVideo');
            const m = document.getElementById('musica');
            v.play();
            m.play();
        }, { once: true });

        const eventDate = new Date("2026-06-07T12:00:00").getTime();
        function updateCountdown() {
            const now = new Date().getTime();
            const diff = eventDate - now;
            if (diff <= 0) {
                document.getElementById("countdown").innerHTML = "🎉 É HOJE O GRANDE DIA!";
                return;
            }
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById("countdown").innerHTML = `⏳ Faltam ${d} dias, ${h}h e ${m}min`;
        }
        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>

</body>

</html>
